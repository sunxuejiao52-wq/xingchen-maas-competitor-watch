name: Daily Competitor Refresh

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "要补跑的日期，格式 YYYY-MM-DD；留空时默认总结北京时间昨天"
        required: false
        type: string

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh competitor data
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
        run: |
          if [ -n "$TARGET_DATE" ]; then
            node scripts/daily-competitor-refresh.mjs --target-date "$TARGET_DATE"
          else
            node scripts/daily-competitor-refresh.mjs
          fi

      - name: Rebuild sharing files
        run: |
          npm run prepare:netlify
          cd outputs/netlify-upload
          zip -q -r -FS ../../xingchen-maas-netlify-upload.zip index.html xingchen-maas-competitor-data.js

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/xingchen-maas-competitor-data.js xingchen-maas-competitor-data.js outputs/daily-briefings outputs/xingchen-maas-competitor-watch-share.html outputs/星辰MaaS竞品动态监测-单文件分享版.html outputs/netlify-upload/index.html outputs/netlify-upload/xingchen-maas-competitor-data.js xingchen-maas-netlify-upload.zip
          if git diff --cached --quiet; then
            echo "No competitor data changes to commit."
          else
            git commit -m "Refresh competitor monitor data"
          fi
